<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CNC Profiles</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <a class="site-name" href="/">CNC Profiles</a>
    <div class="session-actions">
      <span id="session-user"></span>
      <button id="logout-button" class="button ghost" type="button" hidden>Log out</button>
    </div>
  </header>

  <main class="layout">
    <section class="panel" id="login-panel">
      <h1>Profile Settings</h1>
      <form id="login-form" class="stack">
        <label>
          <span>CNC ID</span>
          <input id="login-username" name="username" autocomplete="username" required>
        </label>
        <label>
          <span>Password</span>
          <input id="login-password" name="password" type="password" autocomplete="current-password" required>
        </label>
        <button class="button primary" type="submit">Log in</button>
      </form>
      <p class="status" id="login-status" aria-live="polite"></p>
    </section>

    <section class="panel" id="profile-panel" hidden>
      <div class="profile-header">
        <div>
          <h1 id="profile-username">Profile</h1>
          <p id="profile-updated" class="muted"></p>
        </div>
        <div id="profile-preview" class="preview"></div>
      </div>

      <nav class="profile-tabs" aria-label="Profile sections">
        <button class="tab-button" type="button" data-tab-scope="private" data-tab-name="banners" aria-selected="true">Banners</button>
        <button class="tab-button" type="button" data-tab-scope="private" data-tab-name="game" aria-selected="false">Game</button>
        <button class="tab-button" type="button" data-tab-scope="private" data-tab-name="item" aria-selected="false">Items</button>
      </nav>

      <section class="tab-panel" data-tab-panel-scope="private" data-tab-panel-name="banners">
        <div class="banner-grid" id="banner-list"></div>
        <p class="status" id="profile-status" aria-live="polite"></p>
      </section>

      <section class="tab-panel" data-tab-panel-scope="private" data-tab-panel-name="game" hidden>
        <div class="entity-grid" data-entity-list="private:game"></div>
        <div class="pager">
          <button class="button ghost" type="button" data-entity-prev="private:game">Previous</button>
          <span class="pager-status" data-entity-page="private:game"></span>
          <button class="button ghost" type="button" data-entity-next="private:game">Next</button>
        </div>
        <p class="status" data-entity-status="private:game" aria-live="polite"></p>
      </section>

      <section class="tab-panel" data-tab-panel-scope="private" data-tab-panel-name="item" hidden>
        <div class="entity-toolbar">
          <input type="search" data-entity-search="private:item" placeholder="Search items" autocomplete="off">
        </div>
        <div class="entity-grid item-grid" data-entity-list="private:item"></div>
        <div class="pager">
          <button class="button ghost" type="button" data-entity-prev="private:item">Previous</button>
          <span class="pager-status" data-entity-page="private:item"></span>
          <button class="button ghost" type="button" data-entity-next="private:item">Next</button>
        </div>
        <p class="status" data-entity-status="private:item" aria-live="polite"></p>
      </section>
    </section>

    <section class="panel" id="public-profile-panel" hidden>
      <div class="profile-header">
        <div>
          <h1 id="public-profile-username">Profile</h1>
          <p id="public-profile-updated" class="muted"></p>
        </div>
        <div id="public-profile-preview" class="preview"></div>
      </div>

      <nav class="profile-tabs" aria-label="Profile sections">
        <button class="tab-button" type="button" data-tab-scope="public" data-tab-name="banners" aria-selected="true">Banners</button>
        <button class="tab-button" type="button" data-tab-scope="public" data-tab-name="game" aria-selected="false">Game</button>
        <button class="tab-button" type="button" data-tab-scope="public" data-tab-name="item" aria-selected="false">Items</button>
      </nav>

      <section class="tab-panel" data-tab-panel-scope="public" data-tab-panel-name="banners">
        <div class="banner-grid" id="public-banner-list"></div>
      </section>

      <section class="tab-panel" data-tab-panel-scope="public" data-tab-panel-name="game" hidden>
        <div class="entity-grid" data-entity-list="public:game"></div>
        <div class="pager">
          <button class="button ghost" type="button" data-entity-prev="public:game">Previous</button>
          <span class="pager-status" data-entity-page="public:game"></span>
          <button class="button ghost" type="button" data-entity-next="public:game">Next</button>
        </div>
        <p class="status" data-entity-status="public:game" aria-live="polite"></p>
      </section>

      <section class="tab-panel" data-tab-panel-scope="public" data-tab-panel-name="item" hidden>
        <div class="entity-toolbar">
          <input type="search" data-entity-search="public:item" placeholder="Search items" autocomplete="off">
        </div>
        <div class="entity-grid item-grid" data-entity-list="public:item"></div>
        <div class="pager">
          <button class="button ghost" type="button" data-entity-prev="public:item">Previous</button>
          <span class="pager-status" data-entity-page="public:item"></span>
          <button class="button ghost" type="button" data-entity-next="public:item">Next</button>
        </div>
        <p class="status" data-entity-status="public:item" aria-live="polite"></p>
      </section>
      <p class="status" id="public-profile-status" aria-live="polite"></p>
    </section>
  </main>

  <script src="/index.js" type="module"></script>
</body>
</html>
